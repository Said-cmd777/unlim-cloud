<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlim Cloud</title>
    <style>
        :root {
            --bar-bg: #ffffff;
            --bar-text: #333;
            --bar-border: #e5e7eb;
            --bar-icon: #555;
            --offline-bg: #ef4444;
            --update-bg: #10b981;
        }

        [data-theme="dark"] {
            --bar-bg: #111827;
            --bar-text: #e5e7eb;
            --bar-border: #1f2937;
            --bar-icon: #9ca3af;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bar-bg);
            font-family: 'Verdana', sans-serif;
            transition: background 0.3s;
        }

        /* ── Top toolbar ── */
        #toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 38px;
            padding: 0 12px;
            background: var(--bar-bg);
            border-bottom: 1px solid var(--bar-border);
            transition: background 0.3s, border-color 0.3s;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-logo {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        .toolbar-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--bar-text);
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tb-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 16px;
            color: var(--bar-icon);
            transition: background 0.2s;
            line-height: 1;
        }

        .tb-btn:hover { background: var(--bar-border); }

        #offlineIndicator {
            display: none;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #ef4444;
            font-weight: bold;
        }

        #offlineIndicator.show { display: flex; }

        /* ── Banners ── */
        #updateBanner {
            display: none;
            background: #10b981;
            color: white;
            padding: 7px 16px;
            font-size: 12px;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-shrink: 0;
        }

        #updateBanner.show { display: flex; }

        .update-actions { display: flex; gap: 8px; }

        .banner-btn {
            background: rgba(255,255,255,0.25);
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            padding: 3px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Verdana', sans-serif;
        }

        .banner-btn:hover { background: rgba(255,255,255,0.4); }

        .banner-btn.secondary {
            background: transparent;
            border-color: rgba(255,255,255,0.3);
        }

        /* ── Main area ── */
        #appContainer {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #contentArea {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* ── Splash screen ── */
        #splash {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bar-bg);
            z-index: 5;
            transition: opacity 0.4s ease;
        }

        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #splash img {
            width: 90px;
            animation: popIn 0.7s ease forwards;
            margin-bottom: 20px;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .splash-spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #e5e7eb;
            border-top-color: #34d399;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .splash-text {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 12px;
        }

        /* ── Offline full page ── */
        #offlinePage {
            display: none;
            position: absolute;
            inset: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bar-bg);
            z-index: 6;
        }

        #offlinePage.show { display: flex; }

        .offline-icon { font-size: 56px; margin-bottom: 16px; }

        .offline-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--bar-text);
            margin-bottom: 8px;
        }

        .offline-sub {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 20px;
        }

        .retry-btn {
            padding: 9px 24px;
            border: 2px solid #34d399;
            background: transparent;
            color: #34d399;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Verdana', sans-serif;
            transition: background 0.2s, color 0.2s;
        }

        .retry-btn:hover { background: #34d399; color: white; }

        /* ── App iframe ── */
        #appFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        #appFrame.show { display: block; }

        /* ── Drag & Drop overlay ── */
        #dropOverlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.80);
            z-index: 20;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #dropOverlay.show { display: flex; }

        .drop-cloud { font-size: 72px; animation: float 0.8s ease-in-out infinite alternate; margin-bottom: 16px; }

        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(-14px); }
        }

        .drop-title { color: #fff; font-size: 22px; font-weight: bold; margin-bottom: 6px; }
        .drop-sub { color: rgba(255,255,255,0.6); font-size: 13px; }
    </style>
</head>
<body data-theme="light">
<div id="appContainer">

    <!-- Toolbar -->
    <div id="toolbar">
        <div class="toolbar-left">
            <img class="toolbar-logo" src="/assets/unlim-clear.png" alt="logo">
            <span class="toolbar-title">Unlim Cloud</span>
        </div>
        <div class="toolbar-right">
            <div id="offlineIndicator">
                <span>⚠</span>
                <span>Offline</span>
            </div>
            <button class="tb-btn" id="darkToggle" title="Toggle dark mode">🌙</button>
            <button class="tb-btn" id="reloadBtn" title="Reload app">↻</button>
        </div>
    </div>

    <!-- Update banner -->
    <div id="updateBanner">
        <span id="updateText">A new version is available!</span>
        <div class="update-actions">
            <button class="banner-btn" id="downloadUpdateBtn">Download</button>
            <button class="banner-btn secondary" id="dismissUpdateBtn">Dismiss</button>
        </div>
    </div>

    <!-- Content area -->
    <div id="contentArea">

        <!-- Drag & drop overlay -->
        <div id="dropOverlay">
            <div class="drop-cloud">☁️</div>
            <div class="drop-title">Drop files to upload</div>
            <div class="drop-sub">Release to open Unlim Cloud uploader</div>
        </div>

        <!-- Splash / loading -->
        <div id="splash">
            <img src="/assets/unlim-clear.png" alt="Unlim Cloud">
            <div class="splash-spinner"></div>
            <p class="splash-text" id="splashText">Connecting…</p>
        </div>

        <!-- Offline full screen -->
        <div id="offlinePage">
            <div class="offline-icon">📡</div>
            <div class="offline-title">You're offline</div>
            <div class="offline-sub">Check your internet connection and try again.</div>
            <button class="retry-btn" id="retryOnline">Retry</button>
        </div>

        <!-- The actual web app -->
        <iframe
            id="appFrame"
            src="https://unlim-cloud.web.app"
            title="Unlim Cloud App"
            allow="clipboard-read; clipboard-write"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads allow-modals"
        ></iframe>

    </div>
</div>

<script>
    const WEB_APP_URL = "https://unlim-cloud.web.app";
    const GITHUB_RELEASES_URL = "https://github.com/inulute/unlim-cloud/releases/latest";
    const VERSION_SOURCE = "https://raw.githubusercontent.com/inulute/unlim-cloud/main/package.json";
    const CURRENT_VERSION = "2.0.0";
    const VERSION_PATTERN = /^\d+\.\d+\.\d+$/;

    // ── Dark Mode ─────────────────────────────────────────────────────────────
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
    let isDark = localStorage.getItem('theme') === 'dark' ||
                 (localStorage.getItem('theme') === null && prefersDark.matches);

    function applyTheme(dark) {
        document.body.setAttribute('data-theme', dark ? 'dark' : 'light');
        document.getElementById('darkToggle').textContent = dark ? '☀️' : '🌙';
    }

    applyTheme(isDark);

    document.getElementById('darkToggle').addEventListener('click', () => {
        isDark = !isDark;
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        applyTheme(isDark);
    });

    prefersDark.addEventListener('change', e => {
        if (!localStorage.getItem('theme')) {
            isDark = e.matches;
            applyTheme(isDark);
        }
    });

    // ── Reload ────────────────────────────────────────────────────────────────
    document.getElementById('reloadBtn').addEventListener('click', () => {
        const frame = document.getElementById('appFrame');
        frame.src = frame.src;
    });

    // ── Offline Detection ─────────────────────────────────────────────────────
    const offlineIndicator = document.getElementById('offlineIndicator');
    const offlinePage = document.getElementById('offlinePage');
    const appFrame = document.getElementById('appFrame');
    const splash = document.getElementById('splash');

    function syncOnlineStatus() {
        if (!navigator.onLine) {
            offlineIndicator.classList.add('show');
            if (!appFrame.classList.contains('show')) {
                offlinePage.classList.add('show');
                splash.classList.add('hidden');
            }
        } else {
            offlineIndicator.classList.remove('show');
            offlinePage.classList.remove('show');
        }
    }

    window.addEventListener('online', () => {
        syncOnlineStatus();
        if (!appFrame.classList.contains('show')) loadApp();
    });
    window.addEventListener('offline', syncOnlineStatus);
    syncOnlineStatus();

    document.getElementById('retryOnline').addEventListener('click', () => {
        if (navigator.onLine) {
            offlinePage.classList.remove('show');
            loadApp();
        }
    });

    // ── Native Notifications ──────────────────────────────────────────────────
    async function sendNotification(title, body) {
        try {
            if (window.__TAURI__?.notification) {
                const { isPermissionGranted, requestPermission, sendNotification: n } = window.__TAURI__.notification;
                let ok = await isPermissionGranted();
                if (!ok) ok = (await requestPermission()) === 'granted';
                if (ok) { n({ title, body }); return; }
            }
            if ('Notification' in window && Notification.permission !== 'denied') {
                if (Notification.permission !== 'granted') await Notification.requestPermission();
                if (Notification.permission === 'granted') new Notification(title, { body });
            }
        } catch (_) {}
    }

    // ── Taskbar Progress ──────────────────────────────────────────────────────
    async function setTaskbarProgress(progress) {
        try {
            if (window.__TAURI__?.window?.appWindow) {
                const { appWindow } = window.__TAURI__.window;
                if (progress === null || progress >= 100) {
                    await appWindow.setProgressBar({ status: 'none', progress: 0 });
                } else {
                    await appWindow.setProgressBar({ status: 'normal', progress });
                }
            }
        } catch (_) {}
    }

    // ── Update Check ──────────────────────────────────────────────────────────
    function compareVersions(v1, v2) {
        const p1 = v1.split('.').map(Number);
        const p2 = v2.split('.').map(Number);
        for (let i = 0; i < Math.max(p1.length, p2.length); i++) {
            const a = p1[i] || 0, b = p2[i] || 0;
            if (a > b) return 1;
            if (a < b) return -1;
        }
        return 0;
    }

    async function checkForUpdates() {
        try {
            await setTaskbarProgress(30);
            const ctrl = new AbortController();
            setTimeout(() => ctrl.abort(), 8000);
            const res = await fetch(VERSION_SOURCE, { signal: ctrl.signal });
            if (!res.ok) return;
            const data = await res.json();
            const latest = data.version;
            await setTaskbarProgress(100);
            if (typeof latest === 'string' && VERSION_PATTERN.test(latest) && compareVersions(latest, CURRENT_VERSION) === 1) {
                const banner = document.getElementById('updateBanner');
                document.getElementById('updateText').textContent = `Update available: v${latest}`;
                banner.classList.add('show');
                await sendNotification('Unlim Cloud — Update Available', `Version ${latest} is ready to download.`);
            }
        } catch (_) {
            await setTaskbarProgress(null);
        }
    }

    document.getElementById('downloadUpdateBtn').addEventListener('click', () => {
        window.open(GITHUB_RELEASES_URL, '_blank', 'noopener,noreferrer');
    });

    document.getElementById('dismissUpdateBtn').addEventListener('click', () => {
        document.getElementById('updateBanner').classList.remove('show');
    });

    // ── Load App ──────────────────────────────────────────────────────────────
    function loadApp() {
        if (!navigator.onLine) { syncOnlineStatus(); return; }
        const splashEl = document.getElementById('splash');
        const frame = document.getElementById('appFrame');
        document.getElementById('splashText').textContent = 'Loading Unlim Cloud…';

        frame.onload = () => {
            splashEl.classList.add('hidden');
            frame.classList.add('show');
            setTaskbarProgress(null);
        };

        if (!frame.src || frame.src === 'about:blank') {
            frame.src = WEB_APP_URL;
        } else {
            splashEl.classList.add('hidden');
            frame.classList.add('show');
        }
    }

    // ── Drag & Drop ───────────────────────────────────────────────────────────
    let dragDepth = 0;
    const dropOverlay = document.getElementById('dropOverlay');

    document.addEventListener('dragenter', e => {
        e.preventDefault();
        dragDepth++;
        dropOverlay.classList.add('show');
    });

    document.addEventListener('dragleave', () => {
        dragDepth--;
        if (dragDepth <= 0) { dragDepth = 0; dropOverlay.classList.remove('show'); }
    });

    document.addEventListener('dragover', e => e.preventDefault());

    document.addEventListener('drop', async e => {
        e.preventDefault();
        dragDepth = 0;
        dropOverlay.classList.remove('show');
        const files = e.dataTransfer?.files;
        if (files?.length > 0) {
            window.open(WEB_APP_URL, '_blank', 'noopener,noreferrer');
            await sendNotification('Unlim Cloud', `Opening uploader for ${files.length} file${files.length > 1 ? 's' : ''}.`);
        }
    });

    if (window.__TAURI__?.event) {
        window.__TAURI__.event.listen('tauri://file-drop-hover', () => dropOverlay.classList.add('show'));
        window.__TAURI__.event.listen('tauri://file-drop-cancelled', () => dropOverlay.classList.remove('show'));
        window.__TAURI__.event.listen('tauri://file-drop', async e => {
            dropOverlay.classList.remove('show');
            const paths = e.payload;
            if (paths?.length > 0) {
                window.open(WEB_APP_URL, '_blank', 'noopener,noreferrer');
                await sendNotification('Unlim Cloud', `Opening uploader for ${paths.length} file${paths.length > 1 ? 's' : ''}.`);
            }
        });
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        loadApp();
        checkForUpdates();
    });
</script>
</body>
</html>
