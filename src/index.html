<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlim Cloud</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Verdana', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            color: #333;
        }

        header img {
            animation: openLogo 0.8s ease forwards;
            max-width: 160px;
            display: block;
            margin: 0 auto 24px;
        }

        @keyframes openLogo {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 3px solid #e0e0e0;
            border-top-color: #65de69;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 12px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 14px;
            color: #888;
            margin: 8px 0 0;
        }

        #versionInfo {
            font-size: 15px;
            font-weight: bold;
            color: #2a7a2d;
            margin-bottom: 4px;
            min-height: 22px;
        }

        #versionDisplay {
            margin-top: 10px;
        }

        button {
            margin: 6px 4px;
            padding: 10px 22px;
            border: 2px solid #65de69;
            background-color: transparent;
            color: #65de69;
            font-size: 15px;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.25s, color 0.25s, border-color 0.25s;
            font-family: 'Verdana', sans-serif;
        }

        button:hover {
            border-color: #4aab4e;
            background-color: #4aab4e;
            color: white;
        }

        button:focus-visible {
            outline: 3px solid #65de69;
            outline-offset: 2px;
        }

        #remindLater {
            border-color: #aaa;
            color: #666;
        }

        #remindLater:hover {
            border-color: #ffa5a3;
            background-color: #ffa5a3;
            color: white;
        }

        #retryBtn {
            border-color: #6aabff;
            color: #6aabff;
            margin-top: 12px;
        }

        #retryBtn:hover {
            border-color: #3a88ff;
            background-color: #3a88ff;
            color: white;
        }

        #errorBox {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #errorBox.show {
            display: flex;
        }

        .error-msg {
            font-size: 14px;
            color: #c0392b;
            margin-bottom: 4px;
        }

        .fallback-link {
            font-size: 13px;
            color: #2f77fc;
            text-decoration: none;
            margin-top: 6px;
        }

        .fallback-link:hover {
            text-decoration: underline;
        }

        #donateOptions {
            display: none;
            margin-top: 24px;
        }

        #donateOptions.show {
            display: block;
        }

        .donate-icon-container {
            display: inline-block;
            border: 2px solid #4a4a4a;
            border-radius: 6px;
            padding: 6px;
            width: 104px;
            transition: background-color 0.25s;
            cursor: pointer;
        }

        .donate-icon-container:hover {
            border-color: #797979;
            background-color: #f7ffa3;
        }

        .donate-icon {
            width: 40px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        #donateMessage {
            font-size: 14px;
            color: #555;
            margin: 0 0 10px;
        }

        #currentVersionLabel {
            font-size: 12px;
            color: #bbb;
            margin-top: 32px;
        }
    </style>
</head>
<body>
    <header>
        <img src="/assets/unlim-clear.png" alt="Unlim Cloud Logo">
    </header>

    <main>
        <div id="versionInfo"></div>
        <div id="versionDisplay"></div>

        <div id="loadingBox">
            <div class="spinner"></div>
            <p class="status-text">Checking for updates…</p>
        </div>

        <div id="errorBox">
            <p class="error-msg" id="errorMsg">Could not reach the update server.</p>
            <a class="fallback-link" href="https://unlim-cloud.web.app" target="_blank" rel="noopener noreferrer">
                Open Unlim Cloud Web App
            </a>
            <button id="retryBtn">Retry</button>
        </div>

        <div id="donateOptions">
            <p id="donateMessage">If you find this app useful, consider supporting us.</p>
            <a id="donateLink" href="https://donate.inulute.vercel.app" target="_blank" rel="noopener noreferrer">
                <div class="donate-icon-container">
                    <img src="/assets/donate.png" alt="Donate" class="donate-icon">
                </div>
            </a>
        </div>
    </main>

    <p id="currentVersionLabel">v2.0.0</p>

    <script>
        const VERSION_PATTERN = /^\d+\.\d+\.\d+$/;
        const CURRENT_VERSION = "2.0.0";
        const WEB_APP_URL = "https://unlim-cloud.web.app";
        const GITHUB_RELEASES_URL = "https://github.com/inulute/unlim-cloud/releases/latest";
        const VERSION_SOURCE = "https://raw.githubusercontent.com/inulute/unlim-cloud/main/package.json";
        const FETCH_TIMEOUT_MS = 8000;

        function compareVersions(v1, v2) {
            const parts1 = v1.split('.').map(Number);
            const parts2 = v2.split('.').map(Number);
            for (let i = 0; i < Math.max(parts1.length, parts2.length); i++) {
                const a = parts1[i] || 0;
                const b = parts2[i] || 0;
                if (a > b) return 1;
                if (a < b) return -1;
            }
            return 0;
        }

        function showLoading(visible) {
            document.getElementById('loadingBox').style.display = visible ? 'block' : 'none';
        }

        function showError(message) {
            showLoading(false);
            const box = document.getElementById('errorBox');
            document.getElementById('errorMsg').textContent = message || 'Could not reach the update server.';
            box.classList.add('show');
        }

        function hideError() {
            document.getElementById('errorBox').classList.remove('show');
        }

        async function checkForUpdates() {
            showLoading(true);
            hideError();

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

            try {
                const response = await fetch(VERSION_SOURCE, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error(`Server returned ${response.status}`);
                }

                const data = await response.json();
                const latestVersion = data.version;

                if (typeof latestVersion !== 'string' || !VERSION_PATTERN.test(latestVersion)) {
                    throw new Error('Invalid version format received');
                }

                showLoading(false);

                if (compareVersions(latestVersion, CURRENT_VERSION) === 1) {
                    const versionInfo = document.getElementById('versionInfo');
                    versionInfo.textContent = `Update Available: v${latestVersion}`;

                    const updateButton = document.createElement('button');
                    updateButton.id = 'updateButton';
                    updateButton.textContent = 'Download Update';
                    updateButton.addEventListener('click', () => {
                        window.open(GITHUB_RELEASES_URL, '_blank', 'noopener,noreferrer');
                    });

                    const remindButton = document.createElement('button');
                    remindButton.id = 'remindLater';
                    remindButton.textContent = 'Continue to Web App';
                    remindButton.addEventListener('click', () => {
                        window.location.href = WEB_APP_URL;
                    });

                    const versionDisplay = document.getElementById('versionDisplay');
                    versionDisplay.appendChild(updateButton);
                    versionDisplay.appendChild(remindButton);

                    document.getElementById('donateOptions').classList.add('show');
                } else {
                    window.location.href = WEB_APP_URL;
                }
            } catch (error) {
                clearTimeout(timeoutId);
                console.error('Update check failed:', error);
                const isTimeout = error.name === 'AbortError';
                showError(
                    isTimeout
                        ? 'Connection timed out. Check your internet and try again.'
                        : 'Could not reach the update server. Check your connection.'
                );
            }
        }

        document.getElementById('retryBtn').addEventListener('click', checkForUpdates);
        document.addEventListener('DOMContentLoaded', checkForUpdates);
    </script>
</body>
</html>
